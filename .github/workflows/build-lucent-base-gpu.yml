name: Build lucent-base-gpu

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-lucent-base-gpu.yml"
      - "lucent-serverless/images/gpu/**"
      - "lucent-serverless/lucent_serverless/**"
      - "lucent-serverless/pyproject.toml"

env:
  IMAGE: raylightdimi/lucent-base-gpu

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./lucent-serverless
          file: ./lucent-serverless/images/gpu/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
