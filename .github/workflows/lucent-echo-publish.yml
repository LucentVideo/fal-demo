name: Docker publish (lucent-echo)

on:
  push:
    branches: [feat/custom-serverless]
  workflow_dispatch:

env:
  IMAGE: raylightdimi/lucent-echo

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: lucent-serverless
          file: lucent-serverless/examples/echo/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=lucent-echo
          cache-to: type=gha,mode=max,scope=lucent-echo
