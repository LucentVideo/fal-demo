name: Build lucent-base-cpu

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-lucent-base-cpu.yml'
      - 'lucent-serverless/images/cpu/**'
      - 'lucent-serverless/lucent_serverless/**'
      - 'lucent-serverless/pyproject.toml'

env:
  IMAGE: raylightdimi/lucent-base-cpu

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./lucent-serverless
          file: ./lucent-serverless/images/cpu/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
