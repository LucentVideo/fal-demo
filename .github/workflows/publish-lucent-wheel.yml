name: Publish lucent-serverless wheel

on:
  push:
    branches: [feat/custom-serverless]
    paths:
      - '.github/workflows/publish-lucent-wheel.yml'
      - 'lucent-serverless/lucent_serverless/**'
      - 'lucent-serverless/pyproject.toml'

jobs:
  build-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: uv build --wheel lucent-serverless/

      - name: Upload wheel to controller
        env:
          LUCENT_CONTROLLER_URL: ${{ secrets.LUCENT_CONTROLLER_URL }}
          LUCENT_API_KEY: ${{ secrets.LUCENT_API_KEY }}
        run: |
          WHL=$(ls dist/*.whl)
          echo "Uploading $WHL"
          curl -fsSL -X PUT \
            -H "Authorization: Bearer $LUCENT_API_KEY" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$WHL" \
            "${LUCENT_CONTROLLER_URL}/packages/lucent_serverless.whl"
